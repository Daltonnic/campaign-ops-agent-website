<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campaign Ops Agent — AI-Powered Campaign Command Center</title>
  <meta name="description" content="Campaign Ops Agent gives your team AI-powered briefs, opposition research, rapid response drafts, and real-time task management — built for the speed of a campaign." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #0a0a0b;
      color: #f0efec;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: rgba(232,54,43,0.3); color: #f0efec; }
    input, select, textarea {
      font-family: 'JetBrains Mono', monospace;
      color: #f0efec;
    }
    input::placeholder, textarea::placeholder { color: #3a3a42; }
    select option { background: #18181c; color: #f0efec; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0b; }
    ::-webkit-scrollbar-thumb { background: #2a2a30; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a42; }
    .page-enter { animation: fadeSlide 0.2s ease forwards; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ─────────────────────────────────────────────
// DESIGN TOKENS
// ─────────────────────────────────────────────
const COLORS = {
  bg:       '#0a0a0b',
  surface:  '#111113',
  surface2: '#18181c',
  surface3: '#222228',
  border:   '#2a2a30',
  text:     '#f0efec',
  muted:    '#d0d0d8',
  dim:      '#9a9aa6',
  accent:   '#e8362b',
  gold:     '#c9a235',
};
const C = COLORS;

const FONTS = {
  display: "'Bebas Neue', sans-serif",
  mono:    "'JetBrains Mono', monospace",
  body:    "'Inter', sans-serif",
};
const F = FONTS;

// ─────────────────────────────────────────────
// HOOKS
// ─────────────────────────────────────────────
function useWindowWidth() {
  const [width, setWidth] = React.useState(window.innerWidth);
  React.useEffect(() => {
    const h = () => setWidth(window.innerWidth);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return width;
}

function useResponsive() {
  const w = useWindowWidth();
  return { isMobile: w < 768, isTablet: w >= 768 && w < 1100, isDesktop: w >= 1100, width: w };
}

// ─────────────────────────────────────────────
// SHARED COMPONENTS
// ─────────────────────────────────────────────
function Logo({ size = 32 }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:10 }}>
      <div style={{
        width:size, height:size,
        background:`linear-gradient(135deg,${C.accent} 0%,${C.gold} 100%)`,
        display:'flex', alignItems:'center', justifyContent:'center',
        fontSize:size*0.45, fontFamily:F.display, color:'#fff', flexShrink:0,
      }}>CO</div>
      <span style={{
        fontFamily:F.display, fontSize:size*0.72,
        letterSpacing:'0.15em', color:C.text, lineHeight:1,
      }}>CAMPAIGN OPS AGENT</span>
    </div>
  );
}

function Nav({ currentPage, navigate }) {
  const [scrolled, setScrolled] = React.useState(false);
  const [menuOpen, setMenuOpen] = React.useState(false);
  const { isMobile } = useResponsive();

  React.useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  React.useEffect(() => { setMenuOpen(false); }, [currentPage]);

  const links = [
    { label:'Home', page:'home' },
    { label:'Features', page:'features' },
    { label:'How It Works', page:'how-it-works' },
    { label:'About', page:'about' },
  ];

  const lk = (page) => ({
    fontFamily:F.mono, fontSize:13, letterSpacing:'0.08em',
    color: currentPage === page ? C.text : C.muted,
    textDecoration:'none', textTransform:'uppercase', cursor:'pointer',
    padding:'4px 0',
    borderBottom: currentPage === page ? `1px solid ${C.accent}` : '1px solid transparent',
    transition:'color 0.15s', display:'block',
  });

  return (
    <nav style={{
      position:'fixed', top:0, left:0, right:0, zIndex:200,
      background: (scrolled||menuOpen) ? 'rgba(10,10,11,0.98)' : 'transparent',
      borderBottom: (scrolled||menuOpen) ? `1px solid ${C.border}` : '1px solid transparent',
      transition:'all 0.2s ease',
      backdropFilter: (scrolled||menuOpen) ? 'blur(12px)' : 'none',
    }}>
      <div style={{
        maxWidth:1280, margin:'0 auto', padding:'0 24px',
        display:'flex', alignItems:'center', justifyContent:'space-between', height:64,
      }}>
        <div style={{ cursor:'pointer' }} onClick={() => navigate('home')}>
          <Logo size={isMobile ? 24 : 28} />
        </div>

        {isMobile ? (
          <button onClick={() => setMenuOpen(o => !o)} style={{
            background:'none', border:'none', cursor:'pointer',
            padding:8, display:'flex', flexDirection:'column', gap:5, alignItems:'flex-end',
          }}>
            <div style={{ width:24, height:1.5, background: menuOpen ? C.accent : C.text, transition:'all 0.2s', transform: menuOpen ? 'rotate(45deg) translate(4px,4px)' : 'none' }} />
            <div style={{ width: menuOpen ? 0 : 18, height:1.5, background:C.text, transition:'all 0.2s' }} />
            <div style={{ width:24, height:1.5, background: menuOpen ? C.accent : C.text, transition:'all 0.2s', transform: menuOpen ? 'rotate(-45deg) translate(4px,-4px)' : 'none' }} />
          </button>
        ) : (
          <div style={{ display:'flex', gap:36, alignItems:'center' }}>
            {links.map(l => (
              <span key={l.page} style={lk(l.page)} onClick={() => navigate(l.page)}
                onMouseEnter={e => e.target.style.color = C.text}
                onMouseLeave={e => e.target.style.color = currentPage === l.page ? C.text : C.muted}
              >{l.label}</span>
            ))}
            <span style={{ fontFamily:F.mono, fontSize:13, color:C.muted, cursor:'pointer', letterSpacing:'0.08em', textTransform:'uppercase' }}
              onClick={() => navigate('login')}
              onMouseEnter={e => e.target.style.color = C.text}
              onMouseLeave={e => e.target.style.color = C.muted}
            >Login</span>
            <button onClick={() => navigate('request-access')} style={{
              background:C.accent, color:'#fff', border:'none', padding:'9px 20px',
              fontFamily:F.mono, fontSize:13, letterSpacing:'0.08em',
              textTransform:'uppercase', cursor:'pointer', transition:'opacity 0.15s',
            }}
              onMouseEnter={e => e.target.style.opacity='0.85'}
              onMouseLeave={e => e.target.style.opacity='1'}
            >Request Access →</button>
          </div>
        )}
      </div>

      {isMobile && menuOpen && (
        <div style={{
          background:'rgba(10,10,11,0.99)', borderTop:`1px solid ${C.border}`,
          padding:'24px', display:'flex', flexDirection:'column', gap:0,
        }}>
          {[...links, { label:'Login', page:'login' }].map(l => (
            <div key={l.page} onClick={() => navigate(l.page)} style={{
              fontFamily:F.mono, fontSize:15, letterSpacing:'0.1em',
              color: currentPage === l.page ? C.accent : C.text,
              textTransform:'uppercase', cursor:'pointer',
              padding:'18px 0', borderBottom:`1px solid ${C.border}`,
            }}>{l.label}</div>
          ))}
          <button onClick={() => navigate('request-access')} style={{
            background:C.accent, color:'#fff', border:'none', padding:'16px',
            fontFamily:F.mono, fontSize:14, letterSpacing:'0.1em',
            textTransform:'uppercase', cursor:'pointer', marginTop:20, width:'100%',
          }}>Request Access →</button>
        </div>
      )}
    </nav>
  );
}

function Footer({ navigate }) {
  const { isMobile } = useResponsive();
  const links = [
    { label:'Features', page:'features' },
    { label:'How It Works', page:'how-it-works' },
    { label:'About', page:'about' },
    { label:'Login', page:'login' },
    { label:'Request Access', page:'request-access' },
  ];
  return (
    <footer style={{
      background:C.surface, borderTop:`1px solid ${C.border}`,
      padding: isMobile ? '48px 24px 36px' : '48px 32px',
    }}>
      <div style={{
        maxWidth:1280, margin:'0 auto',
        display:'flex', flexDirection: isMobile ? 'column' : 'row',
        alignItems: isMobile ? 'flex-start' : 'center',
        justifyContent:'space-between', gap: isMobile ? 32 : 24,
      }}>
        <Logo size={22} />
        <div style={{ display:'flex', gap: isMobile ? 20 : 28, flexWrap:'wrap' }}>
          {links.map(l => (
            <span key={l.page} style={{
              fontFamily:F.mono, fontSize:13, color:C.dim,
              textTransform:'uppercase', letterSpacing:'0.08em',
              cursor:'pointer', transition:'color 0.15s',
            }} onClick={() => navigate(l.page)}
              onMouseEnter={e => e.target.style.color = C.text}
              onMouseLeave={e => e.target.style.color = C.dim}
            >{l.label}</span>
          ))}
        </div>
        <span style={{ fontFamily:F.mono, fontSize:13, color:C.dim }}>© 2026 Campaign Ops</span>
      </div>
    </footer>
  );
}

function CTABanner({ navigate }) {
  const { isMobile } = useResponsive();
  return (
    <section style={{ background:C.accent, padding: isMobile ? '72px 24px' : '80px 32px', textAlign:'center' }}>
      <div style={{ maxWidth:800, margin:'0 auto' }}>
        <div style={{
          fontFamily:F.mono, fontSize:13, letterSpacing:'0.15em',
          color:'rgba(255,255,255,0.65)', textTransform:'uppercase', marginBottom:20,
        }}>— Ready When You Are —</div>
        <h2 style={{
          fontFamily:F.display, fontSize: isMobile ? 48 : 'clamp(48px,6vw,80px)',
          color:'#fff', letterSpacing:'0.06em', margin:'0 0 32px', lineHeight:1,
        }}>READY TO RUN A TIGHTER CAMPAIGN?</h2>
        <button onClick={() => navigate('request-access')} style={{
          background:'#fff', color:C.accent, border:'none',
          padding: isMobile ? '16px 32px' : '16px 40px',
          fontFamily:F.mono, fontSize:14, letterSpacing:'0.1em',
          textTransform:'uppercase', cursor:'pointer',
          fontWeight:700, transition:'transform 0.15s',
          width: isMobile ? '100%' : 'auto',
        }}
          onMouseEnter={e => e.target.style.transform='translateY(-2px)'}
          onMouseLeave={e => e.target.style.transform='translateY(0)'}
        >Request Access →</button>
      </div>
    </section>
  );
}

function SectionLabel({ children }) {
  return (
    <div style={{
      fontFamily:F.mono, fontSize:13, letterSpacing:'0.15em',
      color:C.accent, textTransform:'uppercase', marginBottom:16,
    }}>{children}</div>
  );
}

function AppMockup({ style }) {
  const { isMobile } = useResponsive();
  const clips = [
    { tag:'OPP HIT', title:'JONES REVERSES POSITION ON EDUCATION FUNDING', time:'06:12' },
    { tag:'EARNED',  title:'SMITH ENDORSED BY TEACHERS UNION — AP STORY', time:'05:47' },
    { tag:'NEUTRAL', title:'POLLING UPDATE: RACE NARROWS TO 4 POINTS', time:'04:30' },
    { tag:'OPP HIT', title:'ATTACK AD LAUNCHED IN METRO MARKETS', time:'03:15' },
  ];
  const tagStyle = (tag) => ({
    fontFamily:F.mono, fontSize:13, letterSpacing:'0.06em', padding:'2px 8px',
    background: tag==='OPP HIT' ? 'rgba(232,54,43,0.15)' : tag==='EARNED' ? 'rgba(201,162,53,0.15)' : C.surface3,
    color: tag==='OPP HIT' ? C.accent : tag==='EARNED' ? C.gold : C.muted,
    border:`1px solid ${tag==='OPP HIT' ? 'rgba(232,54,43,0.3)' : tag==='EARNED' ? 'rgba(201,162,53,0.3)' : C.border}`,
    flexShrink:0,
  });

  if (isMobile) {
    return (
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:2, overflow:'hidden', ...style }}>
        <div style={{ background:C.surface2, borderBottom:`1px solid ${C.border}`, padding:'10px 16px', display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ display:'flex', gap:6 }}>
            {['#e85c4a','#f0b429','#29cc6a'].map(col => <div key={col} style={{ width:8, height:8, borderRadius:'50%', background:col }} />)}
          </div>
          <span style={{ fontFamily:F.mono, fontSize:13, color:C.muted }}>Campaign Ops — Morning Brief</span>
        </div>
        <div style={{ padding:'16px' }}>
          <div style={{ fontFamily:F.display, fontSize:18, color:C.text, letterSpacing:'0.08em', marginBottom:4 }}>MORNING BRIEF — APR 27, 2026</div>
          <div style={{ fontFamily:F.mono, fontSize:13, color:C.muted, marginBottom:16 }}>4 clips · Generated 06:14 AM</div>
          {clips.map((item, i) => (
            <div key={i} style={{ border:`1px solid ${C.border}`, padding:'12px 14px', marginBottom:8, background: i===0 ? C.surface2 : 'transparent' }}>
              <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:6 }}>
                <div style={tagStyle(item.tag)}>{item.tag}</div>
                <div style={{ fontFamily:F.mono, fontSize:13, color:C.dim }}>{item.time}</div>
              </div>
              <div style={{ fontFamily:F.mono, fontSize:13, color:C.text, lineHeight:1.5 }}>{item.title}</div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:2, overflow:'hidden', ...style }}>
      <div style={{ background:C.surface2, borderBottom:`1px solid ${C.border}`, padding:'8px 16px', display:'flex', alignItems:'center', gap:12 }}>
        <div style={{ display:'flex', gap:6 }}>
          {['#e85c4a','#f0b429','#29cc6a'].map(col => <div key={col} style={{ width:10, height:10, borderRadius:'50%', background:col }} />)}
        </div>
        <span style={{ fontFamily:F.mono, fontSize:13, color:C.muted }}>Campaign Ops — Smith for Senate · Morning Brief</span>
      </div>
      <div style={{ display:'flex', height:320 }}>
        {/* Sidebar */}
        <div style={{ width:180, borderRight:`1px solid ${C.border}`, padding:'16px 0' }}>
          {[
            { icon:'◈', label:'Brief Viewer', active:true },
            { icon:'⬡', label:'Pipeline', active:false },
            { icon:'◉', label:'Rapid Response', active:false },
            { icon:'◻', label:'Opposition', active:false },
            { icon:'◈', label:'Social Posts', active:false },
            { icon:'□', label:'Tasks', active:false },
            { icon:'◎', label:'Contacts', active:false },
          ].map(item => (
            <div key={item.label} style={{
              padding:'8px 16px', display:'flex', alignItems:'center', gap:10,
              background: item.active ? C.surface3 : 'transparent',
              borderLeft: item.active ? `2px solid ${C.accent}` : '2px solid transparent',
            }}>
              <span style={{ fontFamily:F.mono, fontSize:14, color: item.active ? C.accent : C.dim }}>{item.icon}</span>
              <span style={{ fontFamily:F.mono, fontSize:13, color: item.active ? C.text : C.muted }}>{item.label}</span>
            </div>
          ))}
        </div>
        {/* Main */}
        <div style={{ flex:1, padding:16, overflow:'hidden' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
            <div>
              <div style={{ fontFamily:F.display, fontSize:16, color:C.text, letterSpacing:'0.08em' }}>MORNING BRIEF — APR 27, 2026</div>
              <div style={{ fontFamily:F.mono, fontSize:13, color:C.muted }}>4 clips · Generated 06:14 AM · Smith for Senate</div>
            </div>
            <div style={{ background:C.accent, color:'#fff', fontFamily:F.mono, fontSize:13, padding:'4px 10px', letterSpacing:'0.08em' }}>EXPORT PDF</div>
          </div>
          {clips.map((item, i) => (
            <div key={i} style={{ border:`1px solid ${C.border}`, padding:'10px 14px', marginBottom:8, display:'flex', alignItems:'center', gap:12, background: i===0 ? C.surface2 : 'transparent' }}>
              <div style={tagStyle(item.tag)}>{item.tag}</div>
              <div style={{ fontFamily:F.mono, fontSize:13, color:C.text, flex:1, lineHeight:1.4 }}>{item.title}</div>
              <div style={{ fontFamily:F.mono, fontSize:13, color:C.dim }}>{item.time}</div>
            </div>
          ))}
        </div>
        {/* Right panel */}
        <div style={{ width:200, borderLeft:`1px solid ${C.border}`, padding:16 }}>
          <div style={{ fontFamily:F.mono, fontSize:13, color:C.muted, marginBottom:12, letterSpacing:'0.08em' }}>RAPID RESPONSE</div>
          <div style={{ fontFamily:F.mono, fontSize:13, color:C.text, lineHeight:1.6, marginBottom:12, borderLeft:`2px solid ${C.accent}`, paddingLeft:10 }}>
            "Jones's reversal on education funding raises serious questions about whether voters can trust his word."
          </div>
          <div style={{ fontFamily:F.mono, fontSize:13, color:C.muted, marginBottom:12 }}>Draft in 8s · On message</div>
          <div style={{ border:`1px solid ${C.accent}`, color:C.accent, fontFamily:F.mono, fontSize:13, padding:'6px 10px', letterSpacing:'0.06em', textAlign:'center', cursor:'pointer' }}>COPY TO COMMS →</div>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// HOME PAGE
// ─────────────────────────────────────────────
function HomePage({ navigate }) {
  const { isMobile, isTablet } = useResponsive();
  const isSmall = isMobile || isTablet;

  const features = [
    { icon:'◈', name:'AI Press Briefs',      copy:'Daily intelligence briefs generated and ready before your morning call.' },
    { icon:'◉', name:'Opposition Research',   copy:'Build opponent profiles and surface vulnerabilities automatically.' },

    { icon:'□', name:'Task Tracking',         copy:'Keep your team accountable without a separate project manager.' },
    { icon:'◎', name:'Contact Manager',       copy:'Every donor, journalist, and ally in one searchable database.' },

  return (
    <div style={{ background:C.bg }}>

      {/* HERO */}
      <section style={{
        minHeight:'100vh', display:'flex', flexDirection:'column', justifyContent:'center',
        padding: isMobile ? '110px 24px 60px' : '120px 32px 80px',
        position:'relative', overflow:'hidden',
      }}>
        <div style={{
          position:'absolute', inset:0, pointerEvents:'none',
          backgroundImage:`linear-gradient(${C.border} 1px,transparent 1px),linear-gradient(90deg,${C.border} 1px,transparent 1px)`,
          backgroundSize: isMobile ? '40px 40px' : '60px 60px', opacity:0.3,
        }} />
        <div style={{
          position:'absolute', top:-200, right:-200, width:600, height:600, borderRadius:'50%',
          background:`radial-gradient(circle,rgba(232,54,43,0.12) 0%,transparent 70%)`, pointerEvents:'none',
        }} />

        <div style={{ maxWidth:1280, margin:'0 auto', width:'100%', position:'relative' }}>
          <div style={{
            fontFamily:F.mono, fontSize:13, letterSpacing:'0.15em', color:C.accent,
            textTransform:'uppercase', marginBottom:24, display:'flex', alignItems:'center', gap:12,
          }}>
            <div style={{ width:24, height:1, background:C.accent }} />
            AI-Powered Campaign Command Center
          </div>

          <h1 style={{
            fontFamily:F.display,
            fontSize: isMobile ? 'clamp(52px,16vw,80px)' : 'clamp(64px,9vw,128px)',
            color:C.text, letterSpacing:'0.04em', margin:'0 0 4px', lineHeight:0.95,
          }}>YOUR CAMPAIGN.</h1>
          <h1 style={{
            fontFamily:F.display,
            fontSize: isMobile ? 'clamp(52px,16vw,80px)' : 'clamp(64px,9vw,128px)',
            letterSpacing:'0.04em', margin:'0 0 32px', lineHeight:0.95,
            background:`linear-gradient(90deg,${C.accent} 0%,${C.gold} 100%)`,
            WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', backgroundClip:'text',
          }}>ONE COMMAND CENTER.</h1>

          <p style={{
            fontFamily:F.body, fontSize: isMobile ? 17 : 'clamp(16px,1.8vw,20px)',
            color:C.muted, maxWidth:600, lineHeight:1.7, margin:'0 0 40px',
          }}>
            Campaign Ops gives your team AI-powered briefs, opposition research,
            rapid response drafts, and real-time task management — built for the
            speed of a campaign.
          </p>

          <div style={{ display:'flex', gap:16, flexWrap:'wrap', flexDirection: isMobile ? 'column' : 'row' }}>
            <button onClick={() => navigate('request-access')} style={{
              background:C.accent, color:'#fff', border:'none', padding:'16px 36px',
              fontFamily:F.mono, fontSize:14, letterSpacing:'0.1em', textTransform:'uppercase',
              cursor:'pointer', width: isMobile ? '100%' : 'auto',
              transition:'opacity 0.15s',
            }}
              onMouseEnter={e => e.currentTarget.style.opacity='0.85'}

            >Request Access →</button>

        borderTop:`1px solid ${C.border}`, borderBottom:`1px solid ${C.border}`,

        <div style={{
          maxWidth:1280, margin:'0 auto',

                <div style={{ marginBottom:20 }}>
                  <label style={labelStyle}>How did you hear about Campaign Ops Agent?</label>
                  <select value={form.source} onChange={set('source')} style={selectStyle('source')} onFocus={() => setFocused('source')} onBlur={() => setFocused(null)}>
                    <option value="">Select one</option>
                    {['Word of mouth','Conference / event','Social media','Search','Press coverage','Other'].map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>

                <div style={{ marginBottom:28 }}>
                  <label style={labelStyle}>Brief message <span style={{ color:C.dim }}>(optional)</span></label>
                  <textarea value={form.message} onChange={set('message')}
                    placeholder="Tell us about your race, timeline, or anything that would help us set you up."
                    rows={4} style={{ ...inputStyle('message'), resize:'vertical', lineHeight:1.6 }}
                    onFocus={() => setFocused('message')} onBlur={() => setFocused(null)} />
                </div>

                <button type="submit" style={{
                  width:'100%', background:C.accent, color:'#fff', border:'none',
                  padding:'18px', fontFamily:F.mono, fontSize:14, letterSpacing:'0.12em',
                  textTransform:'uppercase', cursor:'pointer', transition:'opacity 0.15s',
                }}
                  onMouseEnter={e => e.currentTarget.style.opacity='0.88'}
                  onMouseLeave={e => e.currentTarget.style.opacity='1'}
                >Submit Request →</button>

                <div style={{ fontFamily:F.mono, fontSize:13, color:C.dim, textAlign:'center', marginTop:16, letterSpacing:'0.06em' }}>
                  Name · Email · Campaign are required. We review within 24 hours.
                </div>
              </form>
            )}
          </div>
        </div>
      </section>
    </div>
  );
}

// ─────────────────────────────────────────────
// APP + ROUTING
// ─────────────────────────────────────────────
function LoginRedirect({ navigate }) {
  React.useEffect(() => {
    const t = setTimeout(() => navigate('home'), 3000);
    return () => clearTimeout(t);
  }, []);
  return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:C.bg, paddingTop:64 }}>
      <div style={{ textAlign:'center' }}>
        <div style={{ fontFamily:F.mono, fontSize:13, color:C.muted, letterSpacing:'0.1em', marginBottom:16 }}>REDIRECTING TO LOGIN…</div>
        <div style={{ fontFamily:F.display, fontSize:32, color:C.text, letterSpacing:'0.08em' }}>HOLD TIGHT.</div>
      </div>
    </div>
  );
}

function App() {
  const [page, setPage] = React.useState(() => window.location.hash.replace('#','') || 'home');

  const navigate = React.useCallback((to) => {
    setPage(to);
    window.location.hash = to;
    window.scrollTo({ top:0 });
  }, []);

  React.useEffect(() => {
    const fn = () => {
      const hash = window.location.hash.replace('#','') || 'home';
      setPage(hash);
      window.scrollTo({ top:0 });
    };
    window.addEventListener('hashchange', fn);
    return () => window.removeEventListener('hashchange', fn);
  }, []);

  const renderPage = () => {
    switch(page) {
      case 'home':           return <HomePage navigate={navigate} />;
      case 'features':       return <FeaturesPage navigate={navigate} />;
      case 'how-it-works':   return <HowItWorksPage navigate={navigate} />;
      case 'about':          return <AboutPage navigate={navigate} />;
      case 'request-access': return <RequestAccessPage navigate={navigate} />;
      case 'login':          return <LoginRedirect navigate={navigate} />;
      default:               return <HomePage navigate={navigate} />;
    }
  };

  return (
    <div>
      <Nav currentPage={page} navigate={navigate} />
      <main key={page} className="page-enter">
        {renderPage()}
      </main>
      <Footer navigate={navigate} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
